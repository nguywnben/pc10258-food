<div class="mx-auto w-full max-w-5xl space-y-8">
  <div class="text-center">
    <h1 class="text-3xl font-extrabold tracking-tight text-ink md:text-4xl">Chọn gói nâng cấp</h1>
    <p class="mt-3 text-base text-ink-light">Danh sách các gói membership premium của hệ thống. Tận hưởng ưu đãi ngay!</p>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading()" class="flex items-center justify-center py-8">
    <div class="inline-flex items-center gap-3">
      <div class="h-5 w-5 animate-spin rounded-full border-2 border-brand border-t-transparent"></div>
      <span class="text-ink-light">Đang tải danh sách gói...</span>
    </div>
  </div>

  <!-- Error State -->
  <div *ngIf="error()" class="rounded-lg border border-red-200 bg-red-50 p-4 text-sm text-red-700">
    {{ error() }}
  </div>

  <!-- Membership Plans Grid -->
  <section *ngIf="plans().length > 0" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    <article 
      *ngFor="let plan of plans()" 
      [class.ring-2]="plan.is_popular === 1"
      [class.ring-brand]="plan.is_popular === 1"
      class="group relative flex min-h-[450px] flex-col items-center justify-between rounded-3xl border-2 border-gray-100 bg-white px-6 py-10 text-center shadow-sm transition-all hover:-translate-y-1 hover:border-brand hover:shadow-xl"
    >
      <!-- Popular Badge -->
      <div *ngIf="plan.is_popular === 1" class="absolute -top-3 left-1/2 -translate-x-1/2 transform">
        <span class="inline-flex items-center gap-1 rounded-full bg-brand px-4 py-1.5 text-xs font-bold text-white shadow-lg">
          ⭐ Phổ biến
        </span>
      </div>

      <div class="w-full">
        <!-- Title -->
        <h2 class="text-2xl font-extrabold text-ink transition-colors group-hover:text-brand">{{ plan.name }}</h2>
        
        <!-- Price Display -->
        <div class="mt-6 flex flex-col items-center justify-center">
          <p class="text-5xl font-black text-brand">{{ formatPrice(plan.price) }}</p>
          <p class="mt-1 text-sm font-medium text-ink-light">/tháng</p>
        </div>

        <hr class="mx-auto my-6 w-12 border-brand/50 transition-all group-hover:w-24 group-hover:border-brand">

        <!-- Features -->
        <ul class="flex flex-col items-start gap-3 text-sm font-medium text-ink-light">
          <li *ngFor="let feature of plan.features" class="flex items-center gap-2 w-full justify-center">
            <svg class="h-4 w-4 text-brand flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
            <span>{{ feature }}</span>
          </li>
        </ul>
      </div>

      <!-- Footer action -->
      <div class="mt-8 flex w-full flex-col items-center">
        <button
          (click)="upgrade(plan)"
          class="w-full max-w-[220px] inline-flex items-center justify-center rounded-full border-2 border-brand bg-white px-6 py-3 text-sm font-bold text-brand transition-all group-hover:bg-brand group-hover:text-white disabled:pointer-events-none disabled:opacity-50"
          type="button"
        >
          Nâng cấp ngay
        </button>
      </div>
    </article>
  </section>

  <!-- Empty State -->
  <div *ngIf="!isLoading() && plans().length === 0 && !error()" class="rounded-lg border border-gray-200 bg-gray-50 p-8 text-center">
    <p class="text-ink-light">Không có gói membership nào để hiển thị</p>
  </div>
</div>
