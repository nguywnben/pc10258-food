<aside
  id="left-sidebar"
  class="flex h-full min-h-0 min-w-0 flex-col border-r border-gray-100 bg-white px-4 py-5"
>
  <div class="mb-6 flex items-center gap-3 px-1">
    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-brand text-sm font-extrabold text-white">
      PC
    </div>
    <span class="text-base font-bold leading-tight text-ink">PC10258 Food</span>
  </div>

  <nav class="flex min-h-0 flex-1 flex-col gap-1 overflow-y-auto" aria-label="Điều hướng chính">
    <a
      routerLink="/"
      [ngClass]="
        exact('/')
          ? 'bg-brand font-semibold text-white hover:bg-brand-hover'
          : 'font-medium text-ink hover:bg-gray-50'
      "
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm transition"
    >
      <svg
        class="h-5 w-5 shrink-0"
        [ngClass]="exact('/') ? 'text-white opacity-90' : 'text-ink-lighter'"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" />
      </svg>
      Tổng quan
    </a>

    <a
      routerLink="/favorites"
      [attr.aria-current]="exact('/favorites') ? 'page' : null"
      [ngClass]="
        exact('/favorites')
          ? 'bg-brand font-semibold text-white hover:bg-brand-hover'
          : 'font-medium text-ink hover:bg-gray-50'
      "
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm transition"
    >
      <svg
        class="h-5 w-5 shrink-0"
        [ngClass]="exact('/favorites') ? 'text-white opacity-90' : 'text-ink-lighter'"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
      </svg>
      Yêu thích
    </a>

    <a
      routerLink="/messages"
      [ngClass]="
        exact('/messages')
          ? 'bg-brand font-semibold text-white hover:bg-brand-hover'
          : 'font-medium text-ink hover:bg-gray-50'
      "
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm transition"
    >
      <svg
        class="h-5 w-5 shrink-0"
        [ngClass]="exact('/messages') ? 'text-white' : 'text-ink-lighter'"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
      </svg>
      Tin nhắn
    </a>

    <a
      routerLink="/orders"
      [ngClass]="
        exact('/orders')
          ? 'bg-brand font-semibold text-white hover:bg-brand-hover'
          : 'font-medium text-ink hover:bg-gray-50'
      "
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm transition"
    >
      <svg
        class="h-5 w-5 shrink-0"
        [ngClass]="exact('/orders') ? 'text-white' : 'text-ink-lighter'"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      Lịch sử đơn
    </a>

    <details
      class="nav-other rounded-xl"
      [attr.open]="detailsOpen() ? '' : null"
      (toggle)="onOtherToggle($event)"
    >
      <summary
        class="flex w-full cursor-pointer list-none select-none items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-semibold transition [-webkit-tap-highlight-color:transparent]"
        [ngClass]="
          otherSummaryHighlight()
            ? 'bg-brand/10 text-brand hover:bg-brand/15'
            : 'text-ink hover:bg-gray-50'
        "
      >
        <svg
          class="h-5 w-5 shrink-0"
          [ngClass]="otherSummaryHighlight() ? 'text-brand' : 'text-ink-lighter'"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <span class="min-w-0 flex-1 text-left">Khác</span>
        <svg
          class="nav-other-chevron ml-auto h-4 w-4 shrink-0"
          [ngClass]="otherSummaryHighlight() ? 'text-brand' : 'text-ink-lighter'"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </summary>
      <div
        class="mt-0.5 space-y-0.5 border-l-2 py-0.5 pl-2 ml-4"
        [ngClass]="otherSectionActive() ? 'border-brand/20' : 'border-gray-100'"
      >
        <a
          routerLink="/account"
          [ngClass]="
            exact('/account')
              ? 'bg-brand font-semibold text-white hover:bg-brand-hover'
              : 'font-medium text-ink-light hover:bg-gray-50 hover:text-ink'
          "
          class="flex items-center gap-2 rounded-lg py-2 pl-3 pr-3 text-left text-sm transition"
        >
          <svg
            class="h-4 w-4 shrink-0"
            [ngClass]="exact('/account') ? 'text-white opacity-90' : 'text-ink-lighter'"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          Hồ sơ
        </a>
        <a
          routerLink="/wallet"
          [ngClass]="
            walletRelated()
              ? 'bg-brand font-semibold text-white hover:bg-brand-hover'
              : 'font-medium text-ink-light hover:bg-gray-50 hover:text-ink'
          "
          class="flex items-center gap-2 rounded-lg py-2 pl-3 pr-3 text-left text-sm transition"
        >
          <svg
            class="h-4 w-4 shrink-0"
            [ngClass]="walletRelated() ? 'text-white opacity-90' : 'text-ink-lighter'"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          Ví &amp; số dư
        </a>
      </div>
    </details>
  </nav>

  <div
    class="mt-auto rounded-2xl px-4 py-4 text-white transition"
    [ngClass]="upgradeRelated() ? 'bg-brand ring-2 ring-white/40' : 'bg-brand'"
  >
    <p class="text-sm font-medium leading-snug">Nâng cấp tài khoản để nhận mã giảm giá miễn phí.</p>
    <a
      routerLink="/upgrade"
      [ngClass]="upgradeRelated() ? 'ring-2 ring-white/70' : ''"
      class="mt-3 inline-flex w-full items-center justify-center rounded-xl bg-white py-2.5 text-sm font-bold text-brand transition hover:bg-white/95"
    >
      Nâng cấp
    </a>
  </div>

  <div class="mt-4 flex flex-col gap-1 border-t border-gray-100 pt-4">
    <a
      routerLink="/help"
      [ngClass]="
        exact('/help')
          ? 'bg-brand/10 font-semibold text-brand'
          : 'font-medium text-ink-light hover:bg-gray-50 hover:text-ink'
      "
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm transition"
      aria-label="Trợ giúp"
    >
      <svg
        class="h-5 w-5 shrink-0"
        [ngClass]="exact('/help') ? 'text-brand' : 'text-ink-lighter'"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      Trợ giúp
    </a>
    <button
      id="nav-logout"
      type="button"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-medium text-red-500 transition hover:bg-red-50"
      (click)="logout()"
    >
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h5a2 2 0 012 2v1"/></svg>
      Đăng xuất
    </button>
  </div>
</aside>
