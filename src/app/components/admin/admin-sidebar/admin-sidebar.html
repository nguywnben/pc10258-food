<aside
  id="left-sidebar"
  class="flex h-full min-h-0 min-w-0 flex-col border-r border-gray-100 bg-white px-4 py-5"
  aria-label="Menu quản trị"
>
  <!-- Logo -->
  <div class="mb-7 flex items-center gap-3 px-1">
    <div
      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-brand text-sm font-extrabold text-white"
    >
      PC
    </div>
    <div class="leading-tight">
      <span class="text-base font-bold text-ink">PC10258</span>
      <span class="block text-[11px] font-medium text-ink-light">Quản trị viên</span>
    </div>
  </div>

  <nav
    class="custom-scroll flex min-h-0 flex-1 flex-col gap-1 overflow-y-auto"
    aria-label="Điều hướng quản trị"
  >
    <p class="mb-1 px-3 text-[10px] font-semibold tracking-wider text-ink-lighter uppercase">Chính</p>

    <a
      routerLink="/admin/dashboard"
      routerLinkActive="sidebar-link-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-ink transition hover:bg-gray-50"
    >
      <svg
        class="h-5 w-5 shrink-0 text-ink-lighter"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"
        />
      </svg>
      Bảng điều khiển
    </a>

    <p class="mb-1 mt-5 px-3 text-[10px] font-semibold tracking-wider text-ink-lighter uppercase">
      Quản lý
    </p>
    <a
      routerLink="/admin/categories"
      routerLinkActive="sidebar-link-active"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-ink transition hover:bg-gray-50"
    >
      <svg
        class="h-5 w-5 shrink-0 text-ink-lighter"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
        />
      </svg>
      Danh mục
    </a>
    <a
      routerLink="/admin/products"
      routerLinkActive="sidebar-link-active"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-ink transition hover:bg-gray-50"
    >
      <svg
        class="h-5 w-5 shrink-0 text-ink-lighter"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
        />
      </svg>
      Sản phẩm
    </a>
    <a
      routerLink="/admin/orders"
      routerLinkActive="sidebar-link-active"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-ink transition hover:bg-gray-50"
    >
      <svg
        class="h-5 w-5 shrink-0 text-ink-lighter"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
        />
      </svg>
      Đơn hàng
    </a>
    <a
      routerLink="/admin/users/list"
      routerLinkActive="sidebar-link-active"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-ink transition hover:bg-gray-50"
    >
      <svg
        class="h-5 w-5 shrink-0 text-ink-lighter"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M17 20h5V9l-5-2m0 13v-7m0-6.5L12 4 2 9v11h5m10 0h-5m0 0v-4a2 2 0 10-4 0v4m4 0h-4"
        />
      </svg>
      Người dùng
    </a>
    <a
      routerLink="/admin/memberships"
      routerLinkActive="sidebar-link-active"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-ink transition hover:bg-gray-50"
    >
      <svg
        class="h-5 w-5 shrink-0 text-ink-lighter"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m3 5.197V21"
        />
      </svg>
      Cấu hình Ranks VIP
    </a>
    <a
      routerLink="/admin/promotions"
      routerLinkActive="sidebar-link-active"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-ink transition hover:bg-gray-50"
    >
      <svg
        class="h-5 w-5 shrink-0 text-ink-lighter"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"
        />
      </svg>
      Khuyến mãi
    </a>
    <a
      routerLink="/admin/messages"
      routerLinkActive="sidebar-link-active"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-ink transition hover:bg-gray-50"
    >
      <svg
        class="h-5 w-5 shrink-0 text-ink-lighter"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
        />
      </svg>

    </a>


  </nav>

  <div class="mt-4 flex flex-col gap-1 border-t border-gray-100 pt-4">
    <a
      routerLink="/"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-medium text-red-500 transition hover:bg-red-50"
    >
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 12l9-9 9 9m-1.5-6.75v12a1.5 1.5 0 01-1.5 1.5h-12a1.5 1.5 0 01-1.5-1.5v-12"
        />
