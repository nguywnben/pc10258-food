<div class="mx-auto w-full max-w-lg">
  <section class="rounded-3xl border border-gray-100 bg-white p-6 sm:p-7">
    <h1 class="text-2xl font-bold">Tạo tài khoản</h1>
    <p class="mt-1 text-sm text-ink-light">Điền thông tin để bắt đầu đặt món nhanh hơn.</p>

    <form class="mt-6 space-y-4" onsubmit="return false;">
      <div>
        <label for="reg-name" class="mb-1 block text-xs font-medium text-ink-light">Họ và tên</label>
        <input
          id="reg-name"
          type="text"
          autocomplete="name"
          placeholder="Ví dụ: Nguyễn Văn A"
          class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-ink outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brand/20"
        />
      </div>

      <div>
        <label for="reg-email" class="mb-1 block text-xs font-medium text-ink-light">Email</label>
        <input
          id="reg-email"
          type="email"
          autocomplete="email"
          placeholder="khach@example.com"
          class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-ink outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brand/20"
        />
      </div>

      <div>
        <label for="reg-phone" class="mb-1 block text-xs font-medium text-ink-light">Số điện thoại</label>
        <input
          id="reg-phone"
          type="text"
          autocomplete="tel"
          placeholder="Ví dụ: 0901 234 567"
          class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-ink outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brand/20"
        />
      </div>

      <div>
        <label for="reg-password" class="mb-1 block text-xs font-medium text-ink-light">Mật khẩu</label>
        <input
          id="reg-password"
          type="password"
          autocomplete="new-password"
          placeholder="Tạo mật khẩu"
          class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-ink outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brand/20"
        />
      </div>

      <div>
        <label for="reg-password-confirm" class="mb-1 block text-xs font-medium text-ink-light">Xác nhận mật khẩu</label>
        <input
          id="reg-password-confirm"
          type="password"
          autocomplete="new-password"
          placeholder="Nhập lại mật khẩu"
          class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-ink outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brand/20"
        />
      </div>

      <label class="flex items-start gap-2 text-sm text-ink-light">
        <input type="checkbox" class="mt-1 h-4 w-4 rounded border-gray-300 text-brand focus:ring-brand/20" />
        <span>
          Tôi đồng ý với <a href="#" class="font-semibold text-brand hover:underline">điều khoản sử dụng</a> (mẫu).
        </span>
      </label>

      <button type="submit" class="w-full rounded-xl bg-brand py-2.5 text-sm font-bold text-white transition hover:bg-brand-hover">
        Tạo tài khoản
      </button>

      <div class="flex items-center justify-between gap-3">
        <a href="/login" class="text-sm font-semibold text-brand transition hover:opacity-90">Đăng nhập</a>
        <a href="/help" class="text-sm font-semibold text-ink-light transition hover:text-brand">Trợ giúp</a>
      </div>
    </form>

    <p class="mt-5 text-xs text-ink-light">Lưu ý: Đây là trang giao diện mẫu. Chưa kết nối backend.</p>
  </section>
</div>
