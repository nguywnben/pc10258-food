<aside
  id="left-sidebar"
  class="flex h-full min-h-0 min-w-0 flex-col border-r border-gray-100 bg-white px-4 py-5"
>
  <div class="mb-6 flex items-center gap-3 px-1">
    <div
      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-brand text-sm font-extrabold text-white"
    >
      PC
    </div>
    <span class="text-base font-bold leading-tight text-ink">PC10258 Food</span>
  </div>

  <nav class="flex min-h-0 flex-1 flex-col gap-1 overflow-y-auto" aria-label="Điều hướng chính">
    <a
      routerLink="/login"
      [attr.aria-current]="exact('/login') ? 'page' : null"
      [ngClass]="
        exact('/login')
          ? 'bg-brand font-semibold text-white hover:bg-brand-hover'
          : 'font-medium text-ink hover:bg-gray-50'
      "
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm transition"
    >
      <svg
        class="h-5 w-5 shrink-0"
        [ngClass]="exact('/login') ? 'opacity-90' : 'text-ink-lighter'"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
        <path d="M8.5 11a4 4 0 100-8 4 4 0 000 8z" />
        <path d="M20 8v6" />
        <path d="M23 11h-6" />
      </svg>
      Đăng nhập
    </a>

    <a
      routerLink="/register"
      [attr.aria-current]="exact('/register') ? 'page' : null"
      [ngClass]="
        exact('/register')
          ? 'bg-brand font-semibold text-white hover:bg-brand-hover'
          : 'font-medium text-ink hover:bg-gray-50'
      "
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm transition"
    >
      <svg
        class="h-5 w-5 shrink-0"
        [ngClass]="exact('/register') ? 'opacity-90' : 'text-ink-lighter'"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
        <path d="M8.5 11a4 4 0 100-8 4 4 0 000 8z" />
        <path d="M23 8v6" />
        <path d="M19 11h8" />
      </svg>
      Đăng ký
    </a>
  </nav>
</aside>
